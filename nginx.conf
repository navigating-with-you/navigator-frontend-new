server {
    listen 8435;
    server_name localhost;

    # Hide nginx version from response headers and error pages
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "DENY"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # CSP for the SPA: allows same-origin scripts and the Kinde auth domain via env var
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://www.google.com https://lh3.googleusercontent.com https://gravatar.com; connect-src 'self' https: wss: http://localhost:* ws://localhost:*; frame-ancestors 'none';" always;

    # Liveness probe used by ECS/load balancer health checks
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression for better page load performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
